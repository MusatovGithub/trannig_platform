{% extends "base.html" %}
{% load static %}

{% block title %}
<title>Добавить достижение</title>
{% endblock %}

{% block content %}
<div class="card w-100 position-relative overflow-hidden">
  <div class="px-4 py-3 mt-2 border-bottom">
    <h4 class="card-title mb-0">
      <i class="bi bi-award-fill text-warning me-2"></i>
      Добавить достижение
    </h4>
  </div>
  <form method="post" enctype="multipart/form-data" class="p-4">
    {% csrf_token %}
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="name" class="form-label">Название</label>
        <input type="text" class="form-control" id="name" name="name" required maxlength="100" placeholder="Введите название достижения">
      </div>
      <div class="col-md-6 mb-3">
        <label for="image" class="form-label">Картинка</label>
        <input type="file" class="form-control" id="image" name="image" accept="image/*">
      </div>
      <div class="col-12 mb-3">
        <label for="description" class="form-label">Описание</label>
        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Описание (необязательно)"></textarea>
      </div>
      <div class="col-12 mb-3">
        <label for="text" class="form-label">Тэг</label>
        <select class="form-select" id="tag" name="tag" required>
          <option value="" disabled selected>Выберите тэг</option>
          {% for value, label in tag_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 mb-3">
        <label for="points" class="form-label">Баллы</label>
        <input type="number" class="form-control" id="points" name="points" required placeholder="Введите баллы">
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success">
        <i class="bi bi-check-circle me-1"></i> Сохранить
      </button>
      <a href="{% url 'achievements:achievement_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Назад
      </a>
    </div>
  </form>
</div>
{% endblock %}
