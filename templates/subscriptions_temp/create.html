{% extends  'base.html' %}
{% load static %}
{% block title %} <title>Добавить шаблон абонемента</title> {% endblock %}

{% block content %}

<div class="row">
    <div class="col-12">
              <!-- start Person Info -->
              <div class="card">
                <div class="card-header text-bg-primary">
                  <h4 class="mb-0 text-white">Добавить шаблон абонемента</h4>
                </div>
  
                <!-- Форма-->
                <form action="" method="post">
                  {% csrf_token %}
                  <div>
                    <div class="card-body">
                      <p class="text-danger">{{error}}</p>
                      <div class="row pt-3">
                        <div class="col-md-6">
                            <div class="mb-3">
                              <label class="form-label">Название</label>
                              <input type="text" id="name" name="name" class="form-control international-inputmask"/>
                            </div>
                        </div>
                        <div class="col-md-6">
                          <div class="mb-3">
                            <label class="form-label">Стоимость</label>
                            <input type="number" id="price" name="price" class="form-control international-inputmask"/>
                          </div>
                        </div>

                        <div class="col-md-6">
                            <div class="mb-3">
                              <label class="form-label">Срок действия</label>
                              <input type="number" id="expired" name="expired" class="form-control international-inputmask"/>
                            </div>
                          </div>

                        <div class="col-md-6">
                            <br>
                            <div class="mb-3 mt-3 ml-3">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input primary" type="radio" name="duration_type" id="primary-radio" value="day" checked/>
                                    <label class="form-check-label" for="primary-radio">Дни</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input primary" type="radio" name="duration_type" id="primary2-radio" value="week"/>
                                    <label class="form-check-label" for="primary2-radio">Недели </label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input primary" type="radio" name="duration_type" id="primary3-radio" value="month" />
                                    <label class="form-check-label" for="primary3-radio">Месяцы</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <div class="mb-3">
                              <label class="form-label">Количество занятий</label>
                              <input type="number" id="number" name="number" class="form-control international-inputmask" value="{{ form_data.phone }}"/>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="mb-3">
                              <input class="form-check-input" type="checkbox" id="inlineCheckbox1" name="unlimited" value="option1">
                              <label class="form-check-label" for="inlineCheckbox1">Безлимитный</label>
                            </div>
                        </div>
                      </div>

                    </div>
  
                    <div class="form-actions">
                      <div class="card-body border-top">
                        <button type="submit" class="btn btn-primary" id="buttonSave">
                          Сохранить
                        </button>
                        <a href="{% url 'customer:subscription_template_all' %}" class="btn bg-danger-subtle text-danger ms-6">
                          Отмена
                        </a>
                      </div>
                    </div>
                  </div>
                </form>
  
              </div>
              <!-- end Person Info -->
            </div>
  </div>
  

  <script>
    document.addEventListener("DOMContentLoaded", function () {
        const unlimitedCheckbox = document.getElementById("inlineCheckbox1");
        const numberInput = document.getElementById("number");
        const isFreeCheckbox = document.getElementById("is_free");
        const paySection = document.getElementById("pay");

        function toggleNumberInput() {
            numberInput.disabled = unlimitedCheckbox.checked;
            if (unlimitedCheckbox.checked) {
                numberInput.value = "";
            }
        }

        function togglePaySection() {
            if (isFreeCheckbox.checked) {
                paySection.style.display = "none";
            } else {
                paySection.style.display = "flex";
            }
        }

        unlimitedCheckbox.addEventListener("change", toggleNumberInput);
        isFreeCheckbox.addEventListener("change", togglePaySection);

        toggleNumberInput();
        togglePaySection();
    });
</script>

{% endblock %}
