{% extends "base.html" %}
{% block content %}
<div class="card w-100 position-relative overflow-hidden">
  <div class="px-4 py-3 mt-2 border-bottom">
    <h4 class="card-title mb-0 d-flex align-items-center">
      <iconify-icon icon="solar:news-bold" class="fs-3 text-primary me-2"></iconify-icon>
      Удалить новость
    </h4>
  </div>
  <div class="p-4">
    <p>Вы уверены, что хотите удалить новость <strong>"{{ news_item.title }}"</strong>?</p>
    <form method="post" class="d-flex gap-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Удалить</button>
      <a href="{% url 'news:news_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
