{% extends base_template %}
{% load static %}
{% block title %}<title>Изменить соревнование</title>{% endblock %}

{% block content %}
<div class="card w-100 position-relative overflow-hidden">
  <div class="px-4 py-3 border-bottom">
    <div class="row">
      <div class="col-lg-12">
        <h4 class="card-title mb-0">Изменить соревнование</h4>
      </div>
    </div>
  </div>
  <div class="card-body">
    <form method="post" autocomplete="off">
      {% csrf_token %}
      {% include 'includes/form_errors.html' %}
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Название</label>
          <input type="text" name="name" class="form-control" required placeholder="Введите название" value="{{ name|default:competition.name }}">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Дата начала</label>
          <div class="input-group date">
            <input type="text" class="form-control datepicker" name="date" placeholder="дд.мм.гггг" autocomplete="off" required value="{{ date|default:competition.date|date:'d.m.Y' }}">
            <span class="input-group-addon input-group-text">
              <i class="ti ti-calendar fs-5"></i>
            </span>
          </div>
          <label class="form-label mt-2">Дата окончания</label>
          <div class="input-group date">
            <input type="text" class="form-control datepicker" name="end_date" placeholder="дд.мм.гггг" autocomplete="off" value="{{ end_date|default:competition.end_date|date:'d.m.Y' }}">
            <span class="input-group-addon input-group-text">
              <i class="ti ti-calendar fs-5"></i>
            </span>
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Место проведения</label>
          <input type="text" name="location" class="form-control" required placeholder="Введите место" value="{{ location|default:competition.location }}">
        </div>
        <div class="col-md-6 mb-3">
          <label for="text" class="form-label">Статус</label>
          <select class="form-select" id="status" name="status">
            <option value="" disabled {% if not status and not competition.status %}selected{% endif %}>Выберите статус (Базово создается со статусом "Активно")</option>
            {% for value, label in status_choices %}
              <option value="{{ label }}" {% if status == label or not status and competition.status == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="d-flex justify-content-between">
        <a href="{% url 'competitions:competitions_list' %}" class="btn btn-secondary">
          <i class="ti ti-arrow-left"></i> Назад
        </a>
        <button type="submit" class="btn btn-success">
          <i class="ti ti-check"></i> Изменить
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
