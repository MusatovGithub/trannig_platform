{% extends "base.html" %}
{% block title %}<title>Достижения клиента</title>{% endblock %}
{% block content %}
<div class="card w-100">
  <div class="card-header">
    <h4 class="mb-0">Достижения для {{ customer.full_name }}</h4>
  </div>
  <form method="post" class="p-4">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Выберите достижения:</label>
      <div class="row">
        {% for achievement in achievements %}
          <div class="col-md-4 mb-2">
            <div class="form-check">
              <input class="form-check-input"
                     type="checkbox"
                     name="achievements"
                     value="{{ achievement.id }}"
                     id="ach_{{ achievement.id }}"
                     {% if achievement in customer.achievements.all %}checked{% endif %}>
              <label class="form-check-label" for="ach_{{ achievement.id }}">
                {% if achievement.image %}
                  <img src="{{ achievement.image.url }}" alt="" style="height:24px;vertical-align:middle;">
                {% else %}
                  <i class="bi bi-award-fill text-warning"></i>
                {% endif %}
                {{ achievement.name }} {% if achievement.points > 0 %}(+ {{ achievement.points }} баллов){% endif %}
              </label>
            </div>
          </div>
        {% empty %}
          <div class="col-12">
            <div class="alert alert-info">У вас нет созданных достижений.</div>
          </div>
        {% endfor %}
      </div>
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'customer:custumer_detaile' customer.id %}" class="btn btn-secondary">Назад</a>
  </form>
</div>
{% endblock %}
