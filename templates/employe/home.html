{% extends  'base2.html' %}
{% load static %}
{% block title %} <title>Главная</title> {% endblock %}

{% block content %}
<h4>Главная</h4>
<div class="row">
    <div class="col-lg-4">
        <div class="card mb-lg-0">
          <div class="card-body">
            <h5 class="card-title mb-4">Тренировки сегодня</h5>
            <ul class="timeline-widget mb-0 position-relative mb-n5" data-simplebar style="height: 397px;">
              {% for item in classess %}
              <li class="timeline-item d-flex position-relative overflow-hidden">
                <div class="timeline-time mt-n1 text-muted flex-shrink-0 text-end">
                  {{item.strat}}
                </div>
                <div class="timeline-badge-wrap d-flex flex-column align-items-center">
                  <span class="timeline-badge bg-primary flex-shrink-0 mt-2"></span>
                  <span class="timeline-badge-border d-block flex-shrink-0"></span>
                </div>
                <div class="timeline-desc fs-12 text-muted mt-n1">
                  <a href="{% url 'groups_custumer:groups_detail_with_date' item.groups_id.id item.date|date:'Y-m-d' %}" class="nav-link">{{item.groups_id}}</a>
                  <br>
                  <small>{{item.employe.full_name}}</small>
                </div>
              </li>
              {% endfor %}
            </ul>
          </div>
        </div>
      </div>
</div>


{% endblock %}
