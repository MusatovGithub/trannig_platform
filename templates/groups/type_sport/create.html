{% extends  'base.html' %}
{% load static %}
{% block title %} <title>Виды спорта</title> {% endblock %}

{% block content %}

<div class="row">
    <div class="col-12">
              <!-- start Person Info -->
              <div class="card">
                <div class="card-header text-bg-primary">
                  <h4 class="mb-0 text-white">Виды спорта</h4>
                </div>
  
                <!-- Форма-->
                <form action="" method="post">
                  {% csrf_token %} 
                  <div>
                    <div class="card-body">
                      <p class="text-danger">{{error}}</p>
                      <div class="row pt-3">
  
                        <!--Название-->
                        <div class="col-md-12">
                          <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input type="text" id="name" name="name" class="form-control"/>
                          </div>
                        </div>

                      </div>
                    </div>
  
                    </div>
  
                    <div class="form-actions">
                      <div class="card-body border-top">
                        <button type="submit" class="btn btn-primary" id="buttonSave">
                          Сохранить
                        </button>
                        <a href="{% url 'groups_custumer:type_sport' %}" class="btn bg-danger-subtle text-danger ms-6">
                          Отмена
                        </a>
                      </div>
                    </div>
                  </div>
                </form>
  
              </div>
              <!-- end Person Info -->
            </div>
  </div>

{% endblock %}
